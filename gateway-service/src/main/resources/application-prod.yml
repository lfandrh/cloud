server:
  port: ${GATEWAY_SERVER_PORT:8888}

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR}
    gateway:
      routes:
        - id: auth-route
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-route
          uri: lb://user-service
          predicates:
            - Path=/user/**
        - id: route-route
          uri: lb://user-service
          predicates:
            - Path=/route/**
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

sa-token:
  token-name: satoken
  is-read-cookie: false
  is-read-header: true
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

